<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0F2440"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8B84B"/>
      <stop offset="100%" stop-color="#C9A03E"/>
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M16 2 L28 6 L28 16 C28 23 22 28 16 31 C10 28 4 23 4 16 L4 6 Z" 
        fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="1"/>
  
  <!-- Inner shield accent -->
  <path d="M16 4 L26 7.5 L26 16 C26 22 21 27 16 29 C11 27 6 22 6 16 L6 7.5 Z" 
        fill="none" stroke="url(#goldGrad)" stroke-width="0.4" opacity="0.5"/>
  
  <!-- DA Monogram -->
  <text x="16" y="20" text-anchor="middle" fill="url(#goldGrad)" 
        font-family="Arial,sans-serif" font-weight="bold" font-size="10" letter-spacing="0.5">DA</text>
  
  <!-- Gold line under DA -->
  <line x1="11" y1="22" x2="21" y2="22" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.6"/>
</svg>
