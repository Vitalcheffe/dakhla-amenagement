  <circle cx="100" cy="100" r="100" fill="#1B3A5C"/>
  
  <!-- Left Tower -->
  <rect x="40" y="30" width="20" height="80" fill="#E8B84B" rx="1"/>
  <rect x="44" y="36" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="44" y="44" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="44" y="52" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="51" y="36" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="51" y="44" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="51" y="52" width="5" height="4" fill="white" rx="0.5"/>
  
  <!-- Middle Tower (tallest) -->
  <rect x="75" y="15" width="25" height="95" fill="#E8B84B" rx="1"/>
  <rect x="80" y="21" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="80" y="29" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="80" y="37" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="80" y="45" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="89" y="21" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="89" y="29" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="89" y="37" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="89" y="45" width="5" height="4" fill="white" rx="0.5"/>
  
  <!-- Right Tower -->
  <rect x="115" y="22" width="22" height="88" fill="#E8B84B" rx="1"/>
  <rect x="120" y="28" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="120" y="36" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="120" y="44" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="128" y="28" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="128" y="36" width="5" height="4" fill="white" rx="0.5"/>
  <rect x="128" y="44" width="5" height="4" fill="white" rx="0.5"/>
  
  <!-- Base -->
