  <!-- Foundation arc -->
  <path d="M 35 113 Q 90 135 145 113" fill="none" stroke="#E8B84B" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Text "DAM" -->
  <text x="100" y="162" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="5">DAM</text>
