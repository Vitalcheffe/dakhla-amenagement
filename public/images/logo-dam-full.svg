<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" width="360" height="180">
  <!-- DAM Logo Full - Building + "DAM" + "DAKHLA AMÉNAGEMENT S.A." -->
  
  <!-- Left Tower (narrowest) -->
  <rect x="30" y="20" width="32" height="80" fill="#1B3A5C" rx="1"/>
  <rect x="37" y="28" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="37" y="40" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="37" y="52" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="37" y="64" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="49" y="28" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="49" y="40" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="49" y="52" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="49" y="64" width="8" height="6" fill="white" rx="0.5"/>
  
  <!-- Middle Tower (tallest, widest) -->
  <rect x="68" y="10" width="44" height="90" fill="#1B3A5C" rx="1"/>
  <rect x="76" y="18" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="76" y="30" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="76" y="42" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="76" y="54" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="76" y="66" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="88" y="18" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="88" y="30" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="88" y="42" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="88" y="54" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="88" y="66" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="100" y="18" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="100" y="30" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="100" y="42" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="100" y="54" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="100" y="66" width="8" height="6" fill="white" rx="0.5"/>
  
  <!-- Right Tower (medium) -->
  <rect x="118" y="15" width="38" height="85" fill="#1B3A5C" rx="1"/>
  <rect x="126" y="23" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="126" y="35" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="126" y="47" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="126" y="59" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="140" y="23" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="140" y="35" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="140" y="47" width="8" height="6" fill="white" rx="0.5"/>
  <rect x="140" y="59" width="8" height="6" fill="white" rx="0.5"/>
  
  <!-- Base platform connecting towers -->
  <rect x="26" y="95" width="134" height="8" fill="#1B3A5C" rx="1"/>
  
  <!-- Foundation arc -->
  <path d="M 26 103 Q 93 130 160 103" fill="none" stroke="#1B3A5C" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Text "DAM" -->
  <text x="93" y="160" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#1B3A5C" text-anchor="middle" letter-spacing="6">DAM</text>
  
  <!-- Separator line -->
  <rect x="170" y="25" width="2" height="110" fill="#E8B84B" rx="1"/>
  
  <!-- Text "DAKHLA" -->
  <text x="185" y="70" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#1B3A5C" letter-spacing="4">DAKHLA</text>
  
  <!-- Text "AMÉNAGEMENT" -->
  <text x="185" y="100" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#1B3A5C" letter-spacing="3">AMÉNAGEMENT</text>
  
  <!-- Text "S.A." -->
  <text x="185" y="125" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#6B7280" letter-spacing="2">S.A.</text>
